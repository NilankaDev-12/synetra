name: Synetra CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# Global env shared across all jobs
# ─────────────────────────────────────────────────────────────────────────────
env:
  NODE_VERSION: "20"
  MONGO_URI: mongodb://localhost:27017/synetra_test
  JWT_SECRET: ci_test_secret_do_not_use_in_prod
  PORT: 5000
  CLIENT_URL: http://localhost:3000
  VITE_API_URL: http://localhost:5000
  VITE_SOCKET_URL: http://localhost:5000
  VITE_GRAPHQL_URL: http://localhost:5000/graphql

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Lint (fast gate, runs in parallel with everything else)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: 🔍 ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npx eslint . --ext js,jsx --max-warnings 0

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — Backend unit + integration tests (Jest + Supertest + MongoDB Memory)
  # ───────────────────────────────────────────────────────────────────────────
  backend-tests:
    name: 🧪 Backend — Jest (unit + integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # Install test deps that don't exist yet in the project.
      # We install them into the backend directly so tests can run.
      - name: Install backend deps + test tooling
        working-directory: backend
        run: |
          npm ci
          npm install --save-dev \
            jest \
            supertest \
            mongodb-memory-server \
            @jest/globals \
            cross-env

      # Write jest config inline so we don't need a committed jest.config.js
      - name: Write jest.config.cjs
        working-directory: backend
        run: |
          cat > jest.config.cjs << 'EOF'
          module.exports = {
            testEnvironment: 'node',
            testMatch: ['**/__tests__/**/*.test.js'],
            forceExit: true,
            detectOpenHandles: true,
            testTimeout: 30000,
            coverageDirectory: 'coverage',
            collectCoverageFrom: [
              'routes/**/*.js',
              'socket/**/*.js',
              'middleware/**/*.js',
              'models/**/*.js',
              '!**/node_modules/**',
            ],
          };
          EOF

      # ── Write the actual test files ────────────────────────────────────────

      - name: Write test helpers
        working-directory: backend
        run: |
          mkdir -p __tests__/helpers
          cat > __tests__/helpers/db.js << 'EOF'
          const { MongoMemoryServer } = require('mongodb-memory-server');
          const mongoose = require('mongoose');

          let mongod;

          async function connect() {
            mongod = await MongoMemoryServer.create();
            await mongoose.connect(mongod.getUri());
          }

          async function closeDatabase() {
            await mongoose.connection.dropDatabase();
            await mongoose.connection.close();
            await mongod.stop();
          }

          async function clearDatabase() {
            const collections = mongoose.connection.collections;
            for (const key in collections) {
              await collections[key].deleteMany({});
            }
          }

          module.exports = { connect, closeDatabase, clearDatabase };
          EOF

          cat > __tests__/helpers/auth.js << 'EOF'
          const jwt = require('jsonwebtoken');
          const User = require('../../models/User');

          async function createUser(overrides = {}) {
            const user = await User.create({
              name: overrides.name || 'Test User',
              email: overrides.email || `test_${Date.now()}@example.com`,
              password: overrides.password || 'password123',
            });
            return user;
          }

          function tokenFor(userId) {
            return jwt.sign({ userId: userId.toString() }, process.env.JWT_SECRET || 'ci_test_secret_do_not_use_in_prod', {
              expiresIn: '1d',
            });
          }

          module.exports = { createUser, tokenFor };
          EOF

      - name: Write auth route tests
        working-directory: backend
        run: |
          cat > __tests__/auth.test.js << 'EOF'
          const request = require('supertest');
          const express = require('express');
          const { connect, closeDatabase, clearDatabase } = require('./helpers/db');
          const authRoutes = require('../routes/auth');

          const app = express();
          app.use(express.json());
          app.use('/api/auth', authRoutes);

          beforeAll(() => connect());
          afterEach(() => clearDatabase());
          afterAll(() => closeDatabase());

          describe('POST /api/auth/register', () => {
            it('registers a new user and returns a token', async () => {
              const res = await request(app).post('/api/auth/register').send({
                name: 'Alice',
                email: 'alice@example.com',
                password: 'secret123',
              });
              expect(res.status).toBe(201);
              expect(res.body.token).toBeDefined();
              expect(res.body.user.email).toBe('alice@example.com');
              expect(res.body.user.password).toBeUndefined();
            });

            it('rejects duplicate email', async () => {
              const payload = { name: 'Bob', email: 'bob@example.com', password: 'pass123' };
              await request(app).post('/api/auth/register').send(payload);
              const res = await request(app).post('/api/auth/register').send(payload);
              expect(res.status).toBe(400);
              expect(res.body.message).toMatch(/already exists/i);
            });

            it('rejects missing name', async () => {
              const res = await request(app).post('/api/auth/register').send({
                email: 'no@name.com',
                password: 'pass123',
              });
              expect(res.status).toBe(400);
            });

            it('rejects invalid email', async () => {
              const res = await request(app).post('/api/auth/register').send({
                name: 'Bad',
                email: 'not-an-email',
                password: 'pass123',
              });
              expect(res.status).toBe(400);
            });

            it('rejects short password', async () => {
              const res = await request(app).post('/api/auth/register').send({
                name: 'Short',
                email: 'short@pass.com',
                password: '123',
              });
              expect(res.status).toBe(400);
            });
          });

          describe('POST /api/auth/login', () => {
            beforeEach(async () => {
              await request(app).post('/api/auth/register').send({
                name: 'Carol',
                email: 'carol@example.com',
                password: 'mypassword',
              });
            });

            it('logs in with valid credentials', async () => {
              const res = await request(app).post('/api/auth/login').send({
                email: 'carol@example.com',
                password: 'mypassword',
              });
              expect(res.status).toBe(200);
              expect(res.body.token).toBeDefined();
              expect(res.body.user.email).toBe('carol@example.com');
            });

            it('rejects wrong password', async () => {
              const res = await request(app).post('/api/auth/login').send({
                email: 'carol@example.com',
                password: 'wrongpassword',
              });
              expect(res.status).toBe(400);
              expect(res.body.message).toMatch(/invalid credentials/i);
            });

            it('rejects unknown email', async () => {
              const res = await request(app).post('/api/auth/login').send({
                email: 'nobody@example.com',
                password: 'pass123',
              });
              expect(res.status).toBe(400);
            });
          });

          describe('GET /api/auth/me', () => {
            it('returns current user for valid token', async () => {
              const reg = await request(app).post('/api/auth/register').send({
                name: 'Dave',
                email: 'dave@example.com',
                password: 'pass1234',
              });
              const { token } = reg.body;
              const res = await request(app)
                .get('/api/auth/me')
                .set('Authorization', `Bearer ${token}`);
              expect(res.status).toBe(200);
              expect(res.body.user.email).toBe('dave@example.com');
            });

            it('returns 401 with no token', async () => {
              const res = await request(app).get('/api/auth/me');
              expect(res.status).toBe(401);
            });

            it('returns 401 with invalid token', async () => {
              const res = await request(app)
                .get('/api/auth/me')
                .set('Authorization', 'Bearer invalidtoken');
              expect(res.status).toBe(401);
            });
          });
          EOF

      - name: Write document route tests
        working-directory: backend
        run: |
          cat > __tests__/document.test.js << 'EOF'
          const request = require('supertest');
          const express = require('express');
          const { connect, closeDatabase, clearDatabase } = require('./helpers/db');
          const { createUser, tokenFor } = require('./helpers/auth');
          const documentRoutes = require('../routes/document');

          const app = express();
          app.use(express.json());
          app.use('/api/documents', documentRoutes);

          beforeAll(() => connect());
          afterEach(() => clearDatabase());
          afterAll(() => closeDatabase());

          describe('POST /api/documents', () => {
            it('creates a document for authenticated user', async () => {
              const user = await createUser();
              const token = tokenFor(user._id);
              const res = await request(app)
                .post('/api/documents')
                .set('Authorization', `Bearer ${token}`)
                .send({ title: 'My Doc' });
              expect(res.status).toBe(201);
              expect(res.body.document.title).toBe('My Doc');
              expect(res.body.document.owner._id.toString()).toBe(user._id.toString());
            });

            it('creates with default title if none provided', async () => {
              const user = await createUser();
              const token = tokenFor(user._id);
              const res = await request(app)
                .post('/api/documents')
                .set('Authorization', `Bearer ${token}`)
                .send({});
              expect(res.status).toBe(201);
              expect(res.body.document.title).toBe('Untitled Document');
            });

            it('returns 401 without auth', async () => {
              const res = await request(app).post('/api/documents').send({ title: 'No auth' });
              expect(res.status).toBe(401);
            });
          });

          describe('GET /api/documents', () => {
            it('returns documents owned by user', async () => {
              const user = await createUser();
              const token = tokenFor(user._id);
              await request(app)
                .post('/api/documents')
                .set('Authorization', `Bearer ${token}`)
                .send({ title: 'Doc A' });
              const res = await request(app)
                .get('/api/documents')
                .set('Authorization', `Bearer ${token}`);
              expect(res.status).toBe(200);
              expect(res.body.documents.length).toBe(1);
              expect(res.body.documents[0].title).toBe('Doc A');
            });

            it('does not return other users documents', async () => {
              const owner = await createUser({ email: 'owner@test.com' });
              const other = await createUser({ email: 'other@test.com' });
              await request(app)
                .post('/api/documents')
                .set('Authorization', `Bearer ${tokenFor(owner._id)}`)
                .send({ title: 'Private' });
              const res = await request(app)
                .get('/api/documents')
                .set('Authorization', `Bearer ${tokenFor(other._id)}`);
              expect(res.status).toBe(200);
              expect(res.body.documents.length).toBe(0);
            });
          });

          describe('GET /api/documents/:id', () => {
            it('returns a document the user owns', async () => {
              const user = await createUser();
              const token = tokenFor(user._id);
              const created = await request(app)
                .post('/api/documents')
                .set('Authorization', `Bearer ${token}`)
                .send({ title: 'Fetchable' });
              const docId = created.body.document._id;
              const res = await request(app)
                .get(`/api/documents/${docId}`)
                .set('Authorization', `Bearer ${token}`);
              expect(res.status).toBe(200);
              expect(res.body.document._id).toBe(docId);
            });

            it('returns 403 for unauthorized user', async () => {
              const owner = await createUser({ email: 'o@test.com' });
              const stranger = await createUser({ email: 's@test.com' });
              const created = await request(app)
                .post('/api/documents')
                .set('Authorization', `Bearer ${tokenFor(owner._id)}`)
                .send({ title: 'Secret' });
              const docId = created.body.document._id;
              const res = await request(app)
                .get(`/api/documents/${docId}`)
                .set('Authorization', `Bearer ${tokenFor(stranger._id)}`);
              expect(res.status).toBe(403);
            });

            it('returns 404 for nonexistent document', async () => {
              const user = await createUser();
              const res = await request(app)
                .get('/api/documents/000000000000000000000000')
                .set('Authorization', `Bearer ${tokenFor(user._id)}`);
              expect(res.status).toBe(404);
            });
          });

          describe('PUT /api/documents/:id', () => {
            it('owner can update title and content', async () => {
              const user = await createUser();
              const token = tokenFor(user._id);
              const created = await request(app)
                .post('/api/documents')
                .set('Authorization', `Bearer ${token}`)
                .send({ title: 'Original' });
              const docId = created.body.document._id;
              const res = await request(app)
                .put(`/api/documents/${docId}`)
                .set('Authorization', `Bearer ${token}`)
                .send({ title: 'Updated', content: '<p>Hello</p>' });
              expect(res.status).toBe(200);
              expect(res.body.document.title).toBe('Updated');
              expect(res.body.document.content).toBe('<p>Hello</p>');
            });

            it('non-owner without permission cannot update', async () => {
              const owner = await createUser({ email: 'own@test.com' });
              const other = await createUser({ email: 'oth@test.com' });
              const created = await request(app)
                .post('/api/documents')
                .set('Authorization', `Bearer ${tokenFor(owner._id)}`)
                .send({ title: 'Protected' });
              const docId = created.body.document._id;
              const res = await request(app)
                .put(`/api/documents/${docId}`)
                .set('Authorization', `Bearer ${tokenFor(other._id)}`)
                .send({ title: 'Hacked' });
              expect(res.status).toBe(403);
            });
          });

          describe('DELETE /api/documents/:id', () => {
            it('owner can delete their document', async () => {
              const user = await createUser();
              const token = tokenFor(user._id);
              const created = await request(app)
                .post('/api/documents')
                .set('Authorization', `Bearer ${token}`)
                .send({ title: 'To Delete' });
              const docId = created.body.document._id;
              const res = await request(app)
                .delete(`/api/documents/${docId}`)
                .set('Authorization', `Bearer ${token}`);
              expect(res.status).toBe(200);
            });

            it('non-owner cannot delete', async () => {
              const owner = await createUser({ email: 'del_o@test.com' });
              const other = await createUser({ email: 'del_x@test.com' });
              const created = await request(app)
                .post('/api/documents')
                .set('Authorization', `Bearer ${tokenFor(owner._id)}`)
                .send({ title: 'Owned' });
              const docId = created.body.document._id;
              const res = await request(app)
                .delete(`/api/documents/${docId}`)
                .set('Authorization', `Bearer ${tokenFor(other._id)}`);
              expect(res.status).toBe(403);
            });
          });
          EOF

      - name: Write share route tests
        working-directory: backend
        run: |
          cat > __tests__/share.test.js << 'EOF'
          const request = require('supertest');
          const express = require('express');
          const { connect, closeDatabase, clearDatabase } = require('./helpers/db');
          const { createUser, tokenFor } = require('./helpers/auth');
          const documentRoutes = require('../routes/document');
          const shareRoutes = require('../routes/share');

          const app = express();
          app.use(express.json());
          app.use('/api/documents', documentRoutes);
          app.use('/api/share', shareRoutes);

          beforeAll(() => connect());
          afterEach(() => clearDatabase());
          afterAll(() => closeDatabase());

          async function createDoc(token, title = 'Shared Doc') {
            const res = await request(app)
              .post('/api/documents')
              .set('Authorization', `Bearer ${token}`)
              .send({ title });
            return res.body.document;
          }

          describe('POST /api/share/:documentId', () => {
            it('owner can share document with another user', async () => {
              const owner = await createUser({ email: 'shr_own@t.com' });
              const recipient = await createUser({ email: 'shr_rec@t.com' });
              const doc = await createDoc(tokenFor(owner._id));
              const res = await request(app)
                .post(`/api/share/${doc._id}`)
                .set('Authorization', `Bearer ${tokenFor(owner._id)}`)
                .send({ email: 'shr_rec@t.com', permission: 'edit' });
              expect(res.status).toBe(200);
              expect(res.body.sharedWith[0].user.email).toBe('shr_rec@t.com');
              expect(res.body.sharedWith[0].permission).toBe('edit');
            });

            it('shared user can now access the document', async () => {
              const owner = await createUser({ email: 'acc_own@t.com' });
              const recipient = await createUser({ email: 'acc_rec@t.com' });
              const doc = await createDoc(tokenFor(owner._id));
              await request(app)
                .post(`/api/share/${doc._id}`)
                .set('Authorization', `Bearer ${tokenFor(owner._id)}`)
                .send({ email: 'acc_rec@t.com', permission: 'view' });
              const res = await request(app)
                .get(`/api/documents/${doc._id}`)
                .set('Authorization', `Bearer ${tokenFor(recipient._id)}`);
              expect(res.status).toBe(200);
            });

            it('cannot share with yourself', async () => {
              const owner = await createUser({ email: 'self@t.com' });
              const doc = await createDoc(tokenFor(owner._id));
              const res = await request(app)
                .post(`/api/share/${doc._id}`)
                .set('Authorization', `Bearer ${tokenFor(owner._id)}`)
                .send({ email: 'self@t.com', permission: 'edit' });
              expect(res.status).toBe(400);
            });

            it('non-owner cannot share', async () => {
              const owner = await createUser({ email: 'nshr_own@t.com' });
              const other = await createUser({ email: 'nshr_oth@t.com' });
              const victim = await createUser({ email: 'nshr_vic@t.com' });
              const doc = await createDoc(tokenFor(owner._id));
              const res = await request(app)
                .post(`/api/share/${doc._id}`)
                .set('Authorization', `Bearer ${tokenFor(other._id)}`)
                .send({ email: 'nshr_vic@t.com', permission: 'view' });
              expect(res.status).toBe(403);
            });

            it('returns 404 for unknown user email', async () => {
              const owner = await createUser({ email: 'unk_own@t.com' });
              const doc = await createDoc(tokenFor(owner._id));
              const res = await request(app)
                .post(`/api/share/${doc._id}`)
                .set('Authorization', `Bearer ${tokenFor(owner._id)}`)
                .send({ email: 'ghost@nowhere.com', permission: 'view' });
              expect(res.status).toBe(404);
            });
          });

          describe('DELETE /api/share/:documentId/:userId', () => {
            it('owner can remove user access', async () => {
              const owner = await createUser({ email: 'rm_own@t.com' });
              const recipient = await createUser({ email: 'rm_rec@t.com' });
              const doc = await createDoc(tokenFor(owner._id));
              await request(app)
                .post(`/api/share/${doc._id}`)
                .set('Authorization', `Bearer ${tokenFor(owner._id)}`)
                .send({ email: 'rm_rec@t.com', permission: 'view' });
              const res = await request(app)
                .delete(`/api/share/${doc._id}/${recipient._id}`)
                .set('Authorization', `Bearer ${tokenFor(owner._id)}`);
              expect(res.status).toBe(200);
              // Recipient can no longer access
              const check = await request(app)
                .get(`/api/documents/${doc._id}`)
                .set('Authorization', `Bearer ${tokenFor(recipient._id)}`);
              expect(check.status).toBe(403);
            });
          });
          EOF

      - name: Write middleware + model unit tests
        working-directory: backend
        run: |
          cat > __tests__/middleware.test.js << 'EOF'
          const request = require('supertest');
          const express = require('express');
          const jwt = require('jsonwebtoken');
          const { connect, closeDatabase, clearDatabase } = require('./helpers/db');
          const { createUser } = require('./helpers/auth');
          const { auth } = require('../middleware/auth');

          const app = express();
          app.use(express.json());
          app.get('/protected', auth, (req, res) => res.json({ userId: req.userId }));

          beforeAll(() => connect());
          afterEach(() => clearDatabase());
          afterAll(() => closeDatabase());

          const SECRET = process.env.JWT_SECRET || 'ci_test_secret_do_not_use_in_prod';

          describe('auth middleware', () => {
            it('passes with valid token', async () => {
              const user = await createUser();
              const token = jwt.sign({ userId: user._id.toString() }, SECRET, { expiresIn: '1d' });
              const res = await request(app)
                .get('/protected')
                .set('Authorization', `Bearer ${token}`);
              expect(res.status).toBe(200);
              expect(res.body.userId).toBe(user._id.toString());
            });

            it('rejects with no token', async () => {
              const res = await request(app).get('/protected');
              expect(res.status).toBe(401);
            });

            it('rejects with tampered token', async () => {
              const res = await request(app)
                .get('/protected')
                .set('Authorization', 'Bearer totally.fake.token');
              expect(res.status).toBe(401);
            });

            it('rejects with expired token', async () => {
              const user = await createUser();
              const token = jwt.sign({ userId: user._id.toString() }, SECRET, { expiresIn: '-1s' });
              const res = await request(app)
                .get('/protected')
                .set('Authorization', `Bearer ${token}`);
              expect(res.status).toBe(401);
            });
          });
          EOF

          cat > __tests__/models.test.js << 'EOF'
          const { connect, closeDatabase, clearDatabase } = require('./helpers/db');
          const User = require('../models/User');
          const Document = require('../models/Document');

          beforeAll(() => connect());
          afterEach(() => clearDatabase());
          afterAll(() => closeDatabase());

          describe('User model', () => {
            it('hashes password on save', async () => {
              const user = await User.create({
                name: 'Hash Test',
                email: 'hash@test.com',
                password: 'plaintext',
              });
              expect(user.password).not.toBe('plaintext');
              expect(user.password.length).toBeGreaterThan(20);
            });

            it('comparePassword returns true for correct password', async () => {
              const user = await User.create({
                name: 'Comp Test',
                email: 'comp@test.com',
                password: 'mypassword',
              });
              const match = await user.comparePassword('mypassword');
              expect(match).toBe(true);
            });

            it('comparePassword returns false for wrong password', async () => {
              const user = await User.create({
                name: 'Wrong',
                email: 'wrong@test.com',
                password: 'correct',
              });
              const match = await user.comparePassword('wrong');
              expect(match).toBe(false);
            });

            it('enforces unique email', async () => {
              await User.create({ name: 'A', email: 'dup@test.com', password: 'pass123' });
              await expect(
                User.create({ name: 'B', email: 'dup@test.com', password: 'pass456' })
              ).rejects.toThrow();
            });
          });

          describe('Document model', () => {
            it('creates document with default title', async () => {
              const user = await User.create({ name: 'DocUser', email: 'du@test.com', password: 'p123456' });
              const doc = await Document.create({ owner: user._id });
              expect(doc.title).toBe('Untitled Document');
              expect(doc.content).toBe('');
            });

            it('updates updatedAt on save', async () => {
              const user = await User.create({ name: 'UpdUser', email: 'upd@test.com', password: 'p123456' });
              const doc = await Document.create({ owner: user._id, title: 'Test' });
              const before = doc.updatedAt;
              await new Promise((r) => setTimeout(r, 10));
              doc.title = 'Changed';
              await doc.save();
              expect(doc.updatedAt.getTime()).toBeGreaterThan(before.getTime());
            });
          });
          EOF

      - name: Write socket unit tests
        working-directory: backend
        run: |
          cat > __tests__/socket.test.js << 'EOF'
          const http = require('http');
          const { Server } = require('socket.io');
          const { io: ioClient } = require('socket.io-client');
          const jwt = require('jsonwebtoken');
          const { connect, closeDatabase, clearDatabase } = require('./helpers/db');
          const { createUser } = require('./helpers/auth');
          const documentSocket = require('../socket/documentSocket');
          const Document = require('../models/Document');

          const SECRET = process.env.JWT_SECRET || 'ci_test_secret_do_not_use_in_prod';

          let httpServer, ioServer, port;

          function makeClient(p) {
            return ioClient(`http://localhost:${p}`, { autoConnect: false, transports: ['websocket'] });
          }

          beforeAll(async () => {
            await connect();
            httpServer = http.createServer();
            ioServer = new Server(httpServer, { cors: { origin: '*' } });
            documentSocket(ioServer);
            await new Promise((res) => httpServer.listen(0, res));
            port = httpServer.address().port;
          });

          afterEach(() => clearDatabase());

          afterAll(async () => {
            ioServer.close();
            await new Promise((res) => httpServer.close(res));
            await closeDatabase();
          });

          function connectAndAuth(client, token) {
            return new Promise((resolve, reject) => {
              client.connect();
              client.on('connect', () => client.emit('authenticate', token));
              client.on('authenticated', ({ success }) => {
                if (success) resolve();
                else reject(new Error('Auth failed'));
              });
              client.on('connect_error', reject);
            });
          }

          describe('Socket authentication', () => {
            it('authenticates with valid JWT', async () => {
              const user = await createUser();
              const token = jwt.sign({ userId: user._id.toString() }, SECRET, { expiresIn: '1d' });
              const client = makeClient(port);
              await expect(connectAndAuth(client, token)).resolves.toBeUndefined();
              client.disconnect();
            });

            it('rejects invalid JWT and disconnects', async () => {
              const client = makeClient(port);
              const result = await new Promise((resolve) => {
                client.connect();
                client.on('connect', () => client.emit('authenticate', 'bad.token'));
                client.on('authenticated', ({ success }) => resolve(success));
              });
              expect(result).toBe(false);
              client.disconnect();
            });
          });

          describe('Socket join-document', () => {
            it('owner receives load-document after joining', async () => {
              const user = await createUser();
              const doc = await Document.create({ owner: user._id, title: 'Socket Doc', content: '<p>hi</p>' });
              const token = jwt.sign({ userId: user._id.toString() }, SECRET, { expiresIn: '1d' });
              const client = makeClient(port);
              const payload = await new Promise((resolve, reject) => {
                client.connect();
                client.on('connect', () => client.emit('authenticate', token));
                client.on('authenticated', () => client.emit('join-document', { documentId: doc._id.toString() }));
                client.on('load-document', resolve);
                client.on('error', reject);
                setTimeout(() => reject(new Error('timeout')), 5000);
              });
              expect(payload.content).toBe('<p>hi</p>');
              expect(payload.title).toBe('Socket Doc');
              client.disconnect();
            });

            it('cursor-position is forwarded to other clients', async () => {
              const userA = await createUser({ email: 'cur_a@t.com' });
              const userB = await createUser({ email: 'cur_b@t.com' });
              const doc = await Document.create({ owner: userA._id, title: 'Cursor Doc', sharedWith: [{ user: userB._id, permission: 'edit' }] });

              const tokenA = jwt.sign({ userId: userA._id.toString() }, SECRET, { expiresIn: '1d' });
              const tokenB = jwt.sign({ userId: userB._id.toString() }, SECRET, { expiresIn: '1d' });

              const clientA = makeClient(port);
              const clientB = makeClient(port);

              const docId = doc._id.toString();

              await new Promise((res) => {
                clientA.connect();
                clientA.on('connect', () => clientA.emit('authenticate', tokenA));
                clientA.on('authenticated', () => clientA.emit('join-document', { documentId: docId }));
                clientA.on('load-document', res);
              });

              await new Promise((res) => {
                clientB.connect();
                clientB.on('connect', () => clientB.emit('authenticate', tokenB));
                clientB.on('authenticated', () => clientB.emit('join-document', { documentId: docId }));
                clientB.on('load-document', res);
              });

              const cursorUpdate = await new Promise((resolve, reject) => {
                clientA.on('cursor-update', resolve);
                clientB.emit('cursor-position', { documentId: docId, position: { from: 5, to: 5 } });
                setTimeout(() => reject(new Error('cursor timeout')), 3000);
              });

              expect(cursorUpdate.position).toEqual({ from: 5, to: 5 });
              expect(cursorUpdate.userId).toBe(userB._id.toString());

              clientA.disconnect();
              clientB.disconnect();
            });
          });
          EOF

      - name: Run Jest with coverage
        working-directory: backend
        env:
          JWT_SECRET: ${{ env.JWT_SECRET }}
          NODE_ENV: test
        run: |
          npx jest --config jest.config.cjs --coverage --runInBand 2>&1

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
