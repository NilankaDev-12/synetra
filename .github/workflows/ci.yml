  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 — Frontend unit tests (Vitest + React Testing Library)
  # ───────────────────────────────────────────────────────────────────────────
  frontend-tests:
    name: 🧪 Frontend — Vitest (unit + component)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps + test tooling
        working-directory: frontend
        run: |
          npm ci
          npm install --save-dev \
            vitest \
            @vitest/coverage-v8 \
            @testing-library/react \
            @testing-library/user-event \
            @testing-library/jest-dom \
            jsdom

      - name: Write vitest config
        working-directory: frontend
        run: |
          cat > vitest.config.js << 'EOF'
          import { defineConfig } from 'vitest/config';
          import react from '@vitejs/plugin-react';

          export default defineConfig({
            plugins: [react()],
            test: {
              globals: true,
              environment: 'jsdom',
              setupFiles: ['./src/__tests__/setup.js'],
              env: {
                VITE_API_URL: 'http://localhost:5000',
                VITE_SOCKET_URL: 'http://localhost:5000',
                VITE_GRAPHQL_URL: 'http://localhost:5000/graphql',
              },
              coverage: {
                provider: 'v8',
                reporter: ['text', 'lcov'],
                include: ['src/**/*.{js,jsx}'],
                exclude: ['src/main.jsx', 'src/**/__tests__/**'],
              },
            },
          });
          EOF

      - name: Write test setup + mocks
        working-directory: frontend
        run: |
          mkdir -p src/__tests__/mocks
          cat > src/__tests__/setup.js << 'EOF'
          import '@testing-library/jest-dom';
          import { vi } from 'vitest';

          // Mock socket service globally so tests never touch the network
          vi.mock('../services/socket', () => ({
            default: {
              socket: { connected: false },
              connect: vi.fn(),
              emit: vi.fn(),
              on: vi.fn(),
              off: vi.fn(),
              joinDocument: vi.fn(),
              leaveDocument: vi.fn(),
              sendChanges: vi.fn(),
              sendCursorPosition: vi.fn(),
              sendTitleChange: vi.fn(),
            },
          }));

          // Prevent jsdom "Not implemented: navigation" from axios 401 interceptor
          Object.defineProperty(window, 'location', {
            writable: true,
            value: { href: '', assign: vi.fn(), replace: vi.fn(), reload: vi.fn() },
          });

          // Suppress noisy console.error in tests
          vi.spyOn(console, 'error').mockImplementation(() => {});
          vi.spyOn(console, 'warn').mockImplementation(() => {});
          EOF

          cat > src/__tests__/mocks/handlers.js << 'EOF'
          import { http, HttpResponse } from 'msw';

          const BASE = 'http://localhost:5000/api';

          export const handlers = [
            http.post(`${BASE}/auth/login`, async ({ request }) => {
              const body = await request.json();
              if (body.email === 'test@example.com' && body.password === 'password123') {
                return HttpResponse.json({
                  token: 'mock-jwt-token',
                  user: { id: 'user1', name: 'Test User', email: 'test@example.com' },
                });
              }
              return HttpResponse.json({ message: 'Invalid credentials' }, { status: 400 });
            }),

            http.post(`${BASE}/auth/register`, async ({ request }) => {
              const body = await request.json();
              return HttpResponse.json(
                {
                  token: 'mock-jwt-token',
                  user: { id: 'newuser', name: body.name, email: body.email },
                },
                { status: 201 }
              );
            }),

            http.get(`${BASE}/auth/me`, () =>
              HttpResponse.json({ user: { id: 'user1', name: 'Test User', email: 'test@example.com' } })
            ),

            http.get(`${BASE}/documents`, () =>
              HttpResponse.json({
                documents: [
                  { _id: 'doc1', title: 'Doc One', owner: { _id: 'user1', name: 'Test User' }, updatedAt: new Date().toISOString() },
                  { _id: 'doc2', title: 'Doc Two', owner: { _id: 'user1', name: 'Test User' }, updatedAt: new Date().toISOString() },
                ],
              })
            ),

            http.get(`${BASE}/documents/:id`, ({ params }) =>
              HttpResponse.json({
                document: {
                  _id: params.id,
                  title: 'Test Document',
                  content: '<p>Hello world</p>',
                  owner: { _id: 'user1', name: 'Test User', email: 'test@example.com' },
                  sharedWith: [],
                },
              })
            ),

            http.post(`${BASE}/documents`, async ({ request }) => {
              const body = await request.json();
              return HttpResponse.json(
                {
                  document: {
                    _id: 'newdoc',
                    title: body.title || 'Untitled Document',
                    owner: { _id: 'user1', name: 'Test User' },
                    content: '',
                    sharedWith: [],
                  },
                },
                { status: 201 }
              );
            }),
          ];
          EOF

      - name: Write utility unit tests
        working-directory: frontend
        run: |
          cat > src/__tests__/utils.test.js << 'EOF'
          import { describe, it, expect } from 'vitest';
          import { getInitials, formatDate, truncateText, getToken, setToken, removeToken } from '../utils/helpers';

          describe('getInitials', () => {
            it('returns initials for full name', () => expect(getInitials('Alice Bob')).toBe('AB'));
            it('returns single initial for one word', () => expect(getInitials('Alice')).toBe('A'));
            it('returns ? for empty/null', () => {
              expect(getInitials('')).toBe('?');
              expect(getInitials(null)).toBe('?');
            });
            it('caps at 2 characters', () => expect(getInitials('Alice Bob Carol').length).toBeLessThanOrEqual(2));
          });

          describe('truncateText', () => {
            it('truncates long text', () => {
              const result = truncateText('hello world', 5);
              expect(result).toBe('hello...');
            });
            it('does not truncate short text', () => {
              expect(truncateText('hi', 50)).toBe('hi');
            });
            it('handles null/empty', () => {
              expect(truncateText('')).toBe('');
              expect(truncateText(null)).toBe('');
            });
          });

          describe('formatDate', () => {
            it('returns empty string for null', () => expect(formatDate(null)).toBe(''));
            it('returns a string for a valid date', () => {
              const result = formatDate(new Date().toISOString());
              expect(typeof result).toBe('string');
              expect(result.length).toBeGreaterThan(0);
            });
          });

          describe('token helpers', () => {
            beforeEach(() => localStorage.clear());

            it('setToken stores token', () => {
              setToken('abc123');
              expect(localStorage.getItem('token')).toBe('abc123');
            });

            it('getToken retrieves token', () => {
              localStorage.setItem('token', 'xyz');
              expect(getToken()).toBe('xyz');
            });

            it('removeToken clears token', () => {
              localStorage.setItem('token', 'todelete');
              removeToken();
              expect(localStorage.getItem('token')).toBeNull();
            });
          });
          EOF

      - name: Write component tests
        working-directory: frontend
        run: |
          cat > src/__tests__/components.test.jsx << 'EOF'
          import { describe, it, expect, vi, beforeAll, afterAll, afterEach } from 'vitest';
          import { render, screen, fireEvent, waitFor } from '@testing-library/react';
          import userEvent from '@testing-library/user-event';
          import { setupServer } from 'msw/node';
          import { handlers } from './mocks/handlers';
          import ActiveUsers from '../components/document/ActiveUsers';
          import Loading from '../components/common/Loading';
          import Button from '../components/common/Button';

          const server = setupServer(...handlers);
          beforeAll(() => server.listen({ onUnhandledRequest: 'bypass' }));
          afterEach(() => server.resetHandlers());
          afterAll(() => server.close());

          // ── ActiveUsers ──────────────────────────────────────────────────
          describe('ActiveUsers', () => {
            const users = [
              { id: 'u1', name: 'Alice Smith', email: 'alice@t.com' },
              { id: 'u2', name: 'Bob Jones', email: 'bob@t.com' },
            ];

            it('renders nothing when no users', () => {
              const { container } = render(<ActiveUsers users={[]} />);
              expect(container.firstChild).toBeNull();
            });

            it('shows user initials', () => {
              render(<ActiveUsers users={users} />);
              expect(screen.getByTitle('Alice Smith')).toBeInTheDocument();
              expect(screen.getByTitle('Bob Jones')).toBeInTheDocument();
            });

            it('shows correct count for 1 user', () => {
              render(<ActiveUsers users={[users[0]]} />);
              expect(screen.getByText('1 other person')).toBeInTheDocument();
            });

            it('shows correct count for multiple users', () => {
              render(<ActiveUsers users={users} />);
              expect(screen.getByText('2 others')).toBeInTheDocument();
            });

            it('uses cursor color when available', () => {
              const cursors = { u1: { color: '#ff0000' } };
              render(<ActiveUsers users={[users[0]]} cursors={cursors} />);
              const avatar = screen.getByTitle('Alice Smith');
              expect(avatar.style.backgroundColor).toBe('rgb(255, 0, 0)');
            });

            it('falls back to default color when no cursor', () => {
              render(<ActiveUsers users={[users[0]]} cursors={{}} />);
              const avatar = screen.getByTitle('Alice Smith');
              expect(avatar.style.backgroundColor).toBeTruthy();
            });
          });

          // ── Loading ──────────────────────────────────────────────────────
          describe('Loading', () => {
            it('renders a loading indicator', () => {
              const { container } = render(<Loading />);
              expect(container.firstChild).toBeTruthy();
            });
          });

          // ── Button ───────────────────────────────────────────────────────
          describe('Button', () => {
            it('renders children', () => {
              render(<Button>Click me</Button>);
              expect(screen.getByText('Click me')).toBeInTheDocument();
            });

            it('calls onClick when clicked', async () => {
              const handler = vi.fn();
              render(<Button onClick={handler}>Go</Button>);
              await userEvent.click(screen.getByText('Go'));
              expect(handler).toHaveBeenCalledTimes(1);
            });

            it('is disabled when disabled prop set', () => {
              render(<Button disabled>Disabled</Button>);
              expect(screen.getByText('Disabled').closest('button')).toBeDisabled();
            });
          });
          EOF

      - name: Write hooks tests
        working-directory: frontend
        run: |
          cat > src/__tests__/hooks.test.jsx << 'EOF'
          import { describe, it, expect, beforeAll, afterAll, afterEach } from 'vitest';
          import { renderHook, waitFor } from '@testing-library/react';
          import { QueryClient, QueryClientProvider } from '@tanstack/react-query';
          import { setupServer } from 'msw/node';
          import { http, HttpResponse } from 'msw';
          import { useDocuments } from '../hooks/useDocuments';

          const server = setupServer(
            http.get('http://localhost:5000/api/documents', () =>
              HttpResponse.json({
                documents: [
                  { _id: 'd1', title: 'Hook Doc', owner: { _id: 'u1', name: 'User' }, updatedAt: new Date().toISOString() },
                ],
              })
            )
          );

          beforeAll(() => server.listen());
          afterEach(() => server.resetHandlers());
          afterAll(() => server.close());

          function makeWrapper() {
            const qc = new QueryClient({ defaultOptions: { queries: { retry: false } } });
            return ({ children }) => (
              <QueryClientProvider client={qc}>{children}</QueryClientProvider>
            );
          }

          describe('useDocuments', () => {
            it('fetches and returns documents', async () => {
              const { result } = renderHook(() => useDocuments(), { wrapper: makeWrapper() });
              await waitFor(() => expect(result.current.isSuccess).toBe(true));
              expect(result.current.data).toHaveLength(1);
              expect(result.current.data[0].title).toBe('Hook Doc');
            });

            it('returns loading state initially', () => {
              const { result } = renderHook(() => useDocuments(), { wrapper: makeWrapper() });
              expect(result.current.isLoading).toBe(true);
            });

            it('handles server errors gracefully', async () => {
              server.use(
                http.get('http://localhost:5000/api/documents', () =>
                  HttpResponse.json({ message: 'Server error' }, { status: 500 })
                )
              );
              const { result } = renderHook(() => useDocuments(), { wrapper: makeWrapper() });
              await waitFor(() => expect(result.current.isError).toBe(true));
            });
          });
          EOF

      - name: Run Vitest with coverage
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:5000
        run: |
          npx vitest run --coverage 2>&1

