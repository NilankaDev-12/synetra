  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4 — Frontend build check
  # ───────────────────────────────────────────────────────────────────────────
  build-check:
    name: 🏗️ Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Vite build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:5000
          VITE_SOCKET_URL: http://localhost:5000
          VITE_GRAPHQL_URL: http://localhost:5000/graphql
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 5 — Playwright E2E tests
  # Needs: build-check (for the built frontend), and both test jobs to pass
  # ───────────────────────────────────────────────────────────────────────────
  e2e:
    name: 🎭 Playwright E2E
    runs-on: ubuntu-latest
    needs: [lint, backend-tests, frontend-tests, build-check]
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Download built frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Install frontend deps (for Playwright)
        working-directory: frontend
        run: npm ci

      - name: Install Playwright + browsers
        working-directory: frontend
        run: |
          npm install --save-dev @playwright/test
          npx playwright install --with-deps chromium firefox

      - name: Write playwright.config.js
        working-directory: frontend
        run: |
          cat > playwright.config.js << 'EOF'
          import { defineConfig, devices } from '@playwright/test';

          export default defineConfig({
            testDir: './e2e',
            fullyParallel: false,
            retries: process.env.CI ? 2 : 0,
            workers: 1,
            reporter: [['html', { open: 'never' }], ['github']],
            use: {
              baseURL: 'http://localhost:4173',
              trace: 'on-first-retry',
              screenshot: 'only-on-failure',
              video: 'on-first-retry',
            },
            projects: [
              { name: 'chromium', use: { ...devices['Desktop Chrome'] } },
              { name: 'firefox',  use: { ...devices['Desktop Firefox'] } },
            ],
            globalSetup: './e2e/global-setup.js',
          });
          EOF

      - name: Write E2E global setup (seed test user)
        working-directory: frontend
        run: |
          mkdir -p e2e
          cat > e2e/global-setup.js << 'EOF'
          import mongoose from 'mongoose';
          import bcrypt from 'bcryptjs';

          export default async function globalSetup() {
            await mongoose.connect(process.env.MONGO_URI || 'mongodb://localhost:27017/synetra_test');

            // Create schema inline since we can't import from backend directly
            const userSchema = new mongoose.Schema({
              name: String,
              email: { type: String, unique: true },
              password: String,
              avatar: { type: String, default: '' },
            });
            const User = mongoose.models.User || mongoose.model('User', userSchema);

            await User.deleteMany({ email: { $in: ['e2e@synetra.test', 'e2e2@synetra.test'] } });

            const hash = await bcrypt.hash('TestPass123!', 10);
            await User.create([
              { name: 'E2E User One', email: 'e2e@synetra.test', password: hash },
              { name: 'E2E User Two', email: 'e2e2@synetra.test', password: hash },
            ]);

            await mongoose.disconnect();
          }
          EOF

      - name: Write E2E test suites
        working-directory: frontend
        run: |
          # ── Auth tests ────────────────────────────────────────────────────
          cat > e2e/auth.spec.js << 'EOF'
          import { test, expect } from '@playwright/test';

          test.describe('Authentication', () => {
            test('login page renders correctly', async ({ page }) => {
              await page.goto('/login');
              await expect(page.getByRole('heading', { name: /sign in|login/i })).toBeVisible();
              await expect(page.getByLabel(/email/i)).toBeVisible();
              await expect(page.getByLabel(/password/i)).toBeVisible();
            });

            test('login with valid credentials redirects to home', async ({ page }) => {
              await page.goto('/login');
              await page.getByLabel(/email/i).fill('e2e@synetra.test');
              await page.getByLabel(/password/i).fill('TestPass123!');
              await page.getByRole('button', { name: /sign in|login/i }).click();
              await expect(page).toHaveURL(/\/$/, { timeout: 10000 });
            });

            test('login with wrong password shows error', async ({ page }) => {
              await page.goto('/login');
              await page.getByLabel(/email/i).fill('e2e@synetra.test');
              await page.getByLabel(/password/i).fill('wrongpassword');
              await page.getByRole('button', { name: /sign in|login/i }).click();
              await expect(page.getByText(/invalid credentials/i)).toBeVisible({ timeout: 5000 });
            });

            test('register page renders correctly', async ({ page }) => {
              await page.goto('/register');
              await expect(page.getByLabel(/name/i)).toBeVisible();
              await expect(page.getByLabel(/email/i)).toBeVisible();
              await expect(page.getByLabel(/password/i).first()).toBeVisible();
            });

            test('unauthenticated user is redirected to login', async ({ page }) => {
              await page.goto('/');
              await expect(page).toHaveURL(/\/login/, { timeout: 5000 });
            });

            test('logout works', async ({ page }) => {
              // Login first
              await page.goto('/login');
              await page.getByLabel(/email/i).fill('e2e@synetra.test');
              await page.getByLabel(/password/i).fill('TestPass123!');
              await page.getByRole('button', { name: /sign in|login/i }).click();
              await page.waitForURL(/\/$/, { timeout: 10000 });

              // Logout
              await page.getByRole('button', { name: /logout|sign out/i }).click();
              await expect(page).toHaveURL(/\/login/, { timeout: 5000 });
            });
          });
          EOF

          # ── Document tests ────────────────────────────────────────────────
          cat > e2e/documents.spec.js << 'EOF'
          import { test, expect } from '@playwright/test';

          test.use({ storageState: undefined });

          async function login(page, email = 'e2e@synetra.test', password = 'TestPass123!') {
            await page.goto('/login');
            await page.getByLabel(/email/i).fill(email);
            await page.getByLabel(/password/i).fill(password);
            await page.getByRole('button', { name: /sign in|login/i }).click();
            await page.waitForURL(/\/$/, { timeout: 10000 });
          }

          test.describe('Document management', () => {
            test.beforeEach(async ({ page }) => {
              await login(page);
            });

            test('home page shows document list or empty state', async ({ page }) => {
              const hasDocs = await page.getByText(/new document|create|your documents/i).count();
              expect(hasDocs).toBeGreaterThan(0);
            });

            test('can create a new document', async ({ page }) => {
              await page.getByRole('button', { name: /new document|create/i }).click();
              await page.waitForURL(/\/document\//, { timeout: 10000 });
              await expect(page).toHaveURL(/\/document\//);
            });

            test('new document opens editor', async ({ page }) => {
              await page.getByRole('button', { name: /new document|create/i }).click();
              await page.waitForURL(/\/document\//, { timeout: 10000 });
              // Editor should be present (tiptap renders a .ProseMirror div)
              await expect(page.locator('.ProseMirror')).toBeVisible({ timeout: 8000 });
            });

            test('can type in the editor', async ({ page }) => {
              await page.getByRole('button', { name: /new document|create/i }).click();
              await page.waitForURL(/\/document\//, { timeout: 10000 });
              const editor = page.locator('.ProseMirror');
              await editor.waitFor({ state: 'visible', timeout: 8000 });
              await editor.click();
              await page.keyboard.type('Hello Synetra');
              await expect(editor).toContainText('Hello Synetra');
            });

            test('document title is editable', async ({ page }) => {
              await page.getByRole('button', { name: /new document|create/i }).click();
              await page.waitForURL(/\/document\//, { timeout: 10000 });
              const titleInput = page.getByPlaceholder(/untitled document/i);
              await titleInput.waitFor({ state: 'visible', timeout: 8000 });
              await titleInput.click({ clickCount: 3 });
              await page.keyboard.type('My E2E Document');
              await page.keyboard.press('Tab');
              await expect(titleInput).toHaveValue('My E2E Document');
            });

            test('back button navigates to home', async ({ page }) => {
              await page.getByRole('button', { name: /new document|create/i }).click();
              await page.waitForURL(/\/document\//, { timeout: 10000 });
              await page.locator('[data-testid="back-button"], button[aria-label*="back"], a[href="/"]').first().click();
              await expect(page).toHaveURL(/\/$/, { timeout: 5000 });
            });
          });
          EOF

          # ── Collaboration (presence) tests ────────────────────────────────
          cat > e2e/collaboration.spec.js << 'EOF'
          import { test, expect, chromium } from '@playwright/test';

          // Test real-time collaboration: two users in the same document
          test.describe('Real-time collaboration', () => {
            test('two users see each other in active users bar', async ({ browser }) => {
              // User A context
              const ctxA = await browser.newContext();
              const pageA = await ctxA.newPage();

              // Login as User A
              await pageA.goto('/login');
              await pageA.getByLabel(/email/i).fill('e2e@synetra.test');
              await pageA.getByLabel(/password/i).fill('TestPass123!');
              await pageA.getByRole('button', { name: /sign in|login/i }).click();
              await pageA.waitForURL(/\/$/, { timeout: 10000 });

              // User A creates a document
              await pageA.getByRole('button', { name: /new document|create/i }).click();
              await pageA.waitForURL(/\/document\//, { timeout: 10000 });
              const docUrl = pageA.url();

              // User B context
              const ctxB = await browser.newContext();
              const pageB = await ctxB.newPage();
              await pageB.goto('/login');
              await pageB.getByLabel(/email/i).fill('e2e2@synetra.test');
              await pageB.getByLabel(/password/i).fill('TestPass123!');
              await pageB.getByRole('button', { name: /sign in|login/i }).click();
              await pageB.waitForURL(/\/$/, { timeout: 10000 });

              // First: User A shares the doc with User B via API so B has access
              const docId = docUrl.split('/document/')[1];
              const loginRes = await pageA.evaluate(async () => {
                return localStorage.getItem('token');
              });

              // Use the backend API directly to share
              await pageA.evaluate(async ({ docId, token }) => {
                await fetch(`http://localhost:5000/api/share/${docId}`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
                  body: JSON.stringify({ email: 'e2e2@synetra.test', permission: 'edit' }),
                });
              }, { docId, token: loginRes });

              // User B navigates to the same document
              await pageB.goto(docUrl);
              await pageB.locator('.ProseMirror').waitFor({ state: 'visible', timeout: 10000 });

              // User A should see User B in the active users bar
              await expect(pageA.getByText(/E2E User Two|e2e2/i)).toBeVisible({ timeout: 8000 });

              await ctxA.close();
              await ctxB.close();
            });

            test('typing by one user is visible to the other', async ({ browser }) => {
              const ctxA = await browser.newContext();
              const ctxB = await browser.newContext();
              const pageA = await ctxA.newPage();
              const pageB = await ctxB.newPage();

              // Login both
              for (const [page, email] of [[pageA, 'e2e@synetra.test'], [pageB, 'e2e2@synetra.test']]) {
                await page.goto('/login');
                await page.getByLabel(/email/i).fill(email);
                await page.getByLabel(/password/i).fill('TestPass123!');
                await page.getByRole('button', { name: /sign in|login/i }).click();
                await page.waitForURL(/\/$/, { timeout: 10000 });
              }

              // A creates doc
              await pageA.getByRole('button', { name: /new document|create/i }).click();
              await pageA.waitForURL(/\/document\//, { timeout: 10000 });
              const docUrl = pageA.url();
              const docId = docUrl.split('/document/')[1];
              const token = await pageA.evaluate(() => localStorage.getItem('token'));

              // Share with B
              await pageA.evaluate(async ({ docId, token }) => {
                await fetch(`http://localhost:5000/api/share/${docId}`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
                  body: JSON.stringify({ email: 'e2e2@synetra.test', permission: 'edit' }),
                });
              }, { docId, token });

              // B joins
              await pageB.goto(docUrl);
              await pageB.locator('.ProseMirror').waitFor({ state: 'visible', timeout: 10000 });

              // A types
              const editorA = pageA.locator('.ProseMirror');
              await editorA.click();
              await pageA.keyboard.type('Collaborative text');

              // B should see the text
              await expect(pageB.locator('.ProseMirror')).toContainText('Collaborative text', { timeout: 8000 });

              await ctxA.close();
              await ctxB.close();
            });
          });
          EOF

      - name: Start backend server
        working-directory: backend
        env:
          MONGO_URI: ${{ env.MONGO_URI }}
          JWT_SECRET: ${{ env.JWT_SECRET }}
          PORT: ${{ env.PORT }}
          CLIENT_URL: ${{ env.CLIENT_URL }}
          NODE_ENV: test
        run: |
          node server.js &
          echo "BACKEND_PID=$!" >> $GITHUB_ENV
          # Wait for server to be ready
          timeout 30 bash -c 'until curl -sf http://localhost:5000/health; do sleep 1; done'

      - name: Serve built frontend
        working-directory: frontend
        run: |
          npx vite preview --port 4173 --host &
          echo "FRONTEND_PID=$!" >> $GITHUB_ENV
          timeout 20 bash -c 'until curl -sf http://localhost:4173; do sleep 1; done'

      - name: Run Playwright tests
        working-directory: frontend
        env:
          MONGO_URI: ${{ env.MONGO_URI }}
          CI: true
        run: npx playwright test --reporter=github,html

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Upload Playwright traces / screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: frontend/test-results/
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 6 — Final summary gate
  # ───────────────────────────────────────────────────────────────────────────
  all-checks-pass:
    name: ✅ All checks passed
    runs-on: ubuntu-latest
    needs: [lint, backend-tests, frontend-tests, build-check, e2e]
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results" | python3 -c "
          import sys, json
          needs = json.load(sys.stdin)
          failed = [k for k, v in needs.items() if v['result'] not in ('success', 'skipped')]
          if failed:
              print('FAILED jobs:', ', '.join(failed))
              sys.exit(1)
          print('All jobs passed!')
          "